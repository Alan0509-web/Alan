<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻譯軟體 - Translator</title>
    <link rel="stylesheet" href="Alan/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 翻譯軟體</h1>
            <p>快速多語言翻譯工具</p>
        </header>

        <main>
            <div class="translator-wrapper">
                <div class="translation-box left-box">
                    <div class="box-header">
                        <label for="source-lang">源語言</label>
                        <select id="source-lang">
                            <option value="en">English (英文)</option>
                            <option value="zh_TW" selected>Traditional Chinese (繁體中文)</option>
                            <option value="zh_CN">Simplified Chinese (簡體中文)</option>
                            <option value="ja">Japanese (日文)</option>
                            <option value="ko">Korean (韓文)</option>
                            <option value="es">Spanish (西班牙文)</option>
                            <option value="fr">French (法文)</option>
                            <option value="de">German (德文)</option>
                            <option value="it">Italian (意大利文)</option>
                            <option value="pt">Portuguese (葡萄牙文)</option>
                        </select>
                    </div>
                    <textarea id="source-text" class="textarea" placeholder="輸入要翻譯的文本..."></textarea>
                    <div class="char-count">
                        <span id="source-count">0</span> / 5000
                    </div>
                </div>

                <div class="swap-button-container">
                    <button id="swap-btn" class="swap-button" title="交換語言">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="translation-box right-box">
                    <div class="box-header">
                        <label for="target-lang">目標語言</label>
                        <select id="target-lang">
                            <option value="en" selected>English (英文)</option>
                            <option value="zh_TW">Traditional Chinese (繁體中文)</option>
                            <option value="zh_CN">Simplified Chinese (簡體中文)</option>
                            <option value="ja">Japanese (日文)</option>
                            <option value="ko">Korean (韓文)</option>
                            <option value="es">Spanish (西班牙文)</option>
                            <option value="fr">French (法文)</option>
                            <option value="de">German (德文)</option>
                            <option value="it">Italian (意大利文)</option>
                            <option value="pt">Portuguese (葡萄牙文)</option>
                        </select>
                    </div>
                    <textarea id="target-text" class="textarea" placeholder="翻譯結果將顯示在這裡..." readonly></textarea>
                    <div class="char-count">
                        <span id="target-count">0</span> / 5000
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button id="translate-btn" class="btn btn-primary">翻 譯</button>
                <button id="copy-btn" class="btn btn-secondary">複製結果</button>
                <button id="clear-btn" class="btn btn-secondary">清空</button>
                <button id="speak-btn" class="btn btn-secondary">朗讀</button>
            </div>

            <div class="preset-section">
                <h2>常用短語</h2>
                <div class="preset-phrases">
                    <button class="preset-btn" data-text="hello">Hello</button>
                    <button class="preset-btn" data-text="good morning">Good Morning</button>
                    <button class="preset-btn" data-text="thank you">Thank You</button>
                    <button class="preset-btn" data-text="sorry">Sorry</button>
                    <button class="preset-btn" data-text="how are you">How are you?</button>
                    <button class="preset-btn" data-text="nice to meet you">Nice to meet you</button>
                    <button class="preset-btn" data-text="welcome">Welcome</button>
                    <button class="preset-btn" data-text="goodbye">Goodbye</button>
                </div>
            </div>

            <div class="history-section">
                <h2>翻譯歷史</h2>
                <div id="history-list" class="history-list"></div>
                <button id="clear-history-btn" class="btn btn-outline">清除歷史</button>
            </div>
        </main>

        <footer>
            <p>💡 提示: 本地翻譯使用預定義字典，更多內容需要網絡連接</p>
            <p>© 2026 翻譯軟體 | Made with ❤️</p>
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <script src="Alan/translator.js"></script>
</body>
</html>
